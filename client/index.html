<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>evilMUD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Below 800×600 the page becomes scrollable rather than letting the UI
       crush itself. Matches RS2's behavior of having a fixed minimum playable
       size below which the browser scrollbars take over. */
    html, body { width: 100%; height: 100%; background: #000; }
    body { overflow: auto; }

    /* RS-style fixed frame layout */
    #game-frame {
      display: none; /* shown when game starts */
      width: 100vw; height: 100vh;
      min-width: 800px; min-height: 600px;
      /* minmax(0, 1fr) prevents the flex track from refusing to shrink below
         its content when the window goes smaller than the fixed 340px/220px
         side panels. Without this, the grid can get stuck in a broken state
         that persists after the window grows back. */
      grid-template-columns: minmax(0, 1fr) 340px;
      grid-template-rows: minmax(0, 1fr) 220px;
      background: url('/ui/stone-bg.png') repeat;
      overflow: hidden;
    }

    #game-canvas {
      grid-column: 1; grid-row: 1;
      width: 100%; height: 100%;
      outline: none; touch-action: none;
      border-right: 4px solid #1a1208;
      border-bottom: 4px solid #1a1208;
      box-shadow: inset 0 0 0 1px rgba(255,200,100,0.15);
    }

    /* Right column spans both rows — transparent, inherits frame bg */
    #ui-right-column {
      grid-column: 2; grid-row: 1 / 3;
      display: flex; flex-direction: column;
      overflow: hidden;
      border-left: 1px solid rgba(255,200,100,0.12);
    }

    /* Chat spans bottom-left — split into chat + stone filler */
    #ui-chat-area {
      grid-column: 1; grid-row: 2;
      border-top: 4px solid #1a1208;
      overflow: hidden;
      display: flex;
    }

    #ui-chat-inner {
      flex: 1;
      overflow: hidden;
    }

    #ui-chat-filler {
      width: 180px;
      flex-shrink: 0;
      border-left: 3px solid #1a1208;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div id="game-frame">
    <canvas id="game-canvas"></canvas>
    <div id="ui-right-column"></div>
    <div id="ui-chat-area">
      <div id="ui-chat-inner"></div>
      <div id="ui-chat-filler">
        <div style="width: 72px; height: 72px; border: 3px solid rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 1px 0 rgba(255,200,100,0.12); background: rgba(0,0,0,0.35);">
          <img src="/ui/hat-icon.png" style="width: 44px; height: 44px; image-rendering: pixelated; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.7));" />
        </div>
        <div style="width: 80%; height: 2px; background: linear-gradient(90deg, transparent, rgba(220,180,80,0.5), transparent);"></div>
        <div style="font-size: 10px; color: rgba(220,180,80,0.8); letter-spacing: 3px; font-weight: bold; font-family: monospace; text-shadow: 0 1px 2px rgba(0,0,0,0.8);">evilMUD</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
