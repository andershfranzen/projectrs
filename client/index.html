<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EvilQuest</title>
  <!-- Cinzel: free Google Font with the same classical-fantasy serif feel as
       the EverQuest title (sharp triangular serifs, geometric proportions,
       carved-in-stone weight). Used on the brand mark in LoginScreen and
       LoadingScreen. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --eq-viewport-width: 100vw;
      --eq-viewport-height: 100vh;
      --eq-viewport-left: 0px;
      --eq-viewport-top: 0px;
      --eq-viewport-right: 0px;
      --eq-viewport-bottom: 0px;
      --eq-viewport-scale: 1;
      --eq-device-pixel-ratio: 1;
      --eq-page-zoom-ratio: 1;
      --eq-ui-scale: 1;
      --eq-ui-scale-inverse-percent: 100%;
      --eq-game-brightness: 1;
      --eq-chat-font-size: 13px;
      --eq-chat-color-player: #ffffff;
      --eq-chat-color-npc: #f4ded5;
      --eq-chat-color-world: #ffff00;
      --eq-chat-color-private: #4fdfff;
      --eq-chat-color-game: #d8372b;
      --eq-chat-color-trade: #ffff00;
    }
    @supports (height: 100dvh) {
      :root {
        --eq-viewport-width: 100dvw;
        --eq-viewport-height: 100dvh;
      }
    }
    /* Below 800×600 the page becomes scrollable rather than letting the UI
       crush itself. Matches RS2's behavior of having a fixed minimum playable
       size below which the browser scrollbars take over. */
    html, body {
      width: 100%; height: 100%; background: #000;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
    }
    body { overflow: auto; }

    html.eq-fixed-client-size body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    input, textarea, [contenteditable="true"] {
      user-select: text;
      -webkit-user-select: text;
    }

    img, canvas {
      -webkit-user-drag: none;
    }

    /* Google permits hiding the reCAPTCHA v3 badge as long as the branding
       notice is shown in the user flow — see the small text under the login
       button in LoginScreen.ts. */
    .grecaptcha-badge { visibility: hidden !important; }

    /* RS-style fixed frame layout */
    #game-frame {
      --eq-base-right-rail-width: 300px;
      --eq-base-chat-height: 220px;
      --right-rail-width: calc(var(--eq-base-right-rail-width) * var(--eq-ui-scale, 1));
      --chat-height: calc(var(--eq-base-chat-height) * var(--eq-ui-scale, 1));
      --minimap-size: 260px;
      --side-tab-size: 44px;
      --side-panel-gap: 8px;
      --side-panel-padding: 6px 7px;
      display: none; /* shown when game starts */
      width: 100vw; height: 100vh;
      min-width: 800px; min-height: 600px;
      /* minmax(0, 1fr) prevents the flex track from refusing to shrink below
         its content when the window goes smaller than the fixed 300px/220px
         side panels. Without this, the grid can get stuck in a broken state
         that persists after the window grows back. */
      grid-template-columns: minmax(0, 1fr) var(--right-rail-width);
      grid-template-rows: minmax(0, 1fr) var(--chat-height);
      position: relative;
      background: #000;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-frame::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: url('/ui/stone-bg.png') repeat;
      transform: rotate(90deg);
      transform-origin: center;
      filter: brightness(0.52) contrast(1.08);
      pointer-events: none;
      z-index: 0;
    }

    #game-canvas {
      grid-column: 1; grid-row: 1;
      width: 100%; height: 100%;
      position: relative; z-index: 1;
      outline: none; touch-action: none;
      border-right: 4px solid #1a1208;
      border-bottom: 4px solid #1a1208;
      box-shadow: inset 0 0 0 1px rgba(255,200,100,0.15);
      filter: brightness(var(--eq-game-brightness, 1));
    }

    #world-overlay-layer {
      grid-column: 1; grid-row: 1;
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      min-width: 0; min-height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    html.eq-browser-page-zoomed #game-canvas {
      touch-action: pinch-zoom;
    }

    /* Right column spans both rows — transparent, inherits frame bg */
    #ui-right-column {
      grid-column: 2; grid-row: 1 / 3;
      position: relative; z-index: 3;
      display: flex; flex-direction: column;
      overflow: hidden;
      border-left: 1px solid rgba(255,200,100,0.12);
    }

    /* Chat spans the full bottom-left track. */
    #ui-chat-area {
      grid-column: 1; grid-row: 2;
      position: relative; z-index: 3;
      border-top: 4px solid #1a1208;
      overflow: hidden;
    }

    #ui-chat-inner {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
    }

    #mobile-control-bar {
      display: none;
    }

    #mobile-status-hud {
      display: none;
    }

    #mobile-logout-button,
    #mobile-admin-button {
      display: none;
    }

    #chat-collapse-button {
      display: none;
    }

    @media (max-height: 700px), (max-width: 1000px) {
      #game-frame {
        --eq-base-chat-height: 160px;
        --minimap-size: 184px;
        --side-tab-size: 36px;
        --side-panel-gap: 6px;
        --side-panel-padding: 5px 6px;
      }
    }

    @media (max-height: 620px) {
      #game-frame {
        --eq-base-chat-height: 140px;
        --minimap-size: 164px;
        --side-tab-size: 34px;
        --side-panel-gap: 5px;
        --side-panel-padding: 4px 5px;
      }
    }

    @media (max-width: 760px), (pointer: coarse) and (max-width: 900px), (max-height: 520px) and (max-width: 900px) and (orientation: landscape) {
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        inset: 0;
        overscroll-behavior: none;
      }

      #game-frame {
        --eq-base-right-rail-width: 0px;
        --eq-base-chat-height: 0px;
        --minimap-size: min(40vw, 150px);
        --side-tab-size: 42px;
        --side-panel-gap: 6px;
        --side-panel-padding: 5px 6px;
        --mobile-nav-height: 68px;
        --mobile-sheet-height: min(58dvh, 470px);
        --mobile-chat-height: min(34dvh, 260px);
        position: fixed;
        left: var(--eq-viewport-left, 0px);
        top: var(--eq-viewport-top, 0px);
        width: var(--eq-viewport-width, 100dvw);
        height: var(--eq-viewport-height, 100dvh);
        min-width: 0;
        min-height: 0;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
      }

      #game-canvas {
        grid-column: 1;
        grid-row: 1;
        border: 0;
        box-shadow: inset 0 0 0 1px rgba(255,200,100,0.12);
      }

      #ui-right-column,
      #ui-chat-area {
        grid-column: 1;
        grid-row: 1;
        position: fixed;
        left: calc(var(--eq-viewport-left, 0px) + 8px);
        right: calc(var(--eq-viewport-right, 0px) + 8px);
        bottom: calc(var(--eq-viewport-bottom, 0px) + var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px) + 8px);
        height: var(--mobile-sheet-height);
        max-height: calc(var(--eq-viewport-height, 100dvh) - var(--mobile-nav-height) - env(safe-area-inset-bottom, 0px) - 18px);
        z-index: 25;
        overflow: hidden;
        border: 2px solid rgba(97, 79, 49, 0.95);
        border-radius: 6px 6px 0 0;
        background:
          linear-gradient(rgba(18, 13, 9, 0.82), rgba(18, 13, 9, 0.82)),
          url('/ui/stone-bg.png') repeat;
        box-shadow: 0 -8px 28px rgba(0,0,0,0.5);
        transform: translateY(calc(100% + var(--mobile-nav-height) + 24px));
        transition: transform 120ms ease-out;
        pointer-events: none;
      }

      #game-frame.mobile-panel-open #ui-right-column,
      #game-frame.mobile-map-open #ui-right-column,
      #game-frame.mobile-chat-open #ui-chat-area {
        transform: translateY(0);
        pointer-events: auto;
      }

      #game-frame.mobile-panel-open #ui-right-column {
        left: calc(var(--eq-viewport-left, 0px) + 20px);
        right: calc(var(--eq-viewport-right, 0px) + 20px);
        width: min(320px, calc(var(--eq-viewport-width, 100dvw) - 40px));
        margin-left: auto;
        margin-right: auto;
      }

      #game-frame.mobile-map-open {
        --minimap-size: min(76vw, 280px);
      }

      #game-frame.mobile-map-open #ui-right-column {
        left: calc(var(--eq-viewport-left, 0px) + 8px);
        right: auto;
        width: calc(var(--minimap-size) + 28px);
        height: calc(var(--minimap-size) + 28px);
        justify-content: center;
        align-items: center;
        padding: 10px 0;
      }

      #game-frame.mobile-map-open #side-panel,
      #game-frame.mobile-panel-open .eq-minimap {
        display: none !important;
      }

      #game-frame.mobile-panel-open #side-panel .side-resource-row {
        display: none !important;
      }

      #game-frame.mobile-panel-open #side-panel .side-account-actions,
      #game-frame.mobile-panel-open #side-panel .side-logout {
        display: flex !important;
      }

      #ui-right-column {
        border-left: 2px solid rgba(97, 79, 49, 0.95);
      }

      #ui-chat-area {
        border-top: 2px solid rgba(97, 79, 49, 0.95);
        height: var(--mobile-chat-height);
        background: rgba(18, 13, 9, 0.72);
        backdrop-filter: blur(1px);
      }

      #ui-chat-inner,
      #chat-panel {
        width: 100%;
        height: 100%;
      }

      #dialogue-panel {
        width: auto !important;
        max-width: calc(100% - 16px);
        box-sizing: border-box;
      }

      #dialogue-options {
        width: 100% !important;
      }

      #chat-log {
        font-size: 13px !important;
        line-height: 1.45 !important;
        background: rgba(32, 22, 15, 0.68) !important;
      }

      #chat-input {
        font-size: 16px !important;
        min-height: 40px;
      }

      #mobile-status-hud {
        position: fixed;
        left: calc(var(--eq-viewport-left, 0px) + 8px);
        top: calc(var(--eq-viewport-top, 0px) + 8px + env(safe-area-inset-top, 0px));
        z-index: 42;
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: min(172px, calc(var(--eq-viewport-width, 100vw) - 16px));
        padding: 6px;
        background:
          linear-gradient(rgba(10, 7, 5, 0.78), rgba(10, 7, 5, 0.78)),
          url('/ui/stone-bg.png') repeat;
        border: 1px solid rgba(108, 82, 48, 0.9);
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.32);
        pointer-events: none;
      }

      #mobile-logout-button,
      #mobile-admin-button {
        position: fixed;
        top: calc(var(--eq-viewport-top, 0px) + 8px + env(safe-area-inset-top, 0px));
        z-index: 43;
        display: block;
        min-width: 82px;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid rgba(180,80,60,0.5);
        border-radius: 3px;
        background: rgba(42, 15, 12, 0.78);
        color: #d8372b;
        font: 700 11px Arial, Helvetica, sans-serif;
        text-shadow: 1px 1px 0 #000;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
        touch-action: manipulation;
      }

      #mobile-logout-button {
        right: calc(var(--eq-viewport-right, 0px) + 8px);
      }

      #mobile-admin-button {
        right: calc(var(--eq-viewport-right, 0px) + 98px);
        background: rgba(26, 23, 48, 0.82);
        border-color: rgba(120,110,190,0.55);
      }

      .mobile-status-item {
        min-width: 0;
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        gap: 5px;
      }

      .mobile-status-label {
        color: #d8372b;
        font: 700 10px Arial, Helvetica, sans-serif;
        text-shadow: 1px 1px 0 #000;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mobile-status-track {
        position: relative;
        height: 13px;
        background: #0a0705;
        border: 1px solid rgba(0,0,0,0.9);
        overflow: hidden;
      }

      .mobile-status-fill {
        height: 100%;
        width: 100%;
        transition: width 120ms linear;
      }

      .mobile-status-fill.hp {
        background: linear-gradient(180deg, #1a8a1a 0%, #0a6a0a 100%);
      }

      .mobile-status-fill.good {
        background: linear-gradient(180deg, #2a7aaa 0%, #1a5a8a 100%);
      }

      .mobile-status-fill.evil {
        background: linear-gradient(180deg, #8a2a8a 0%, #5a1a5a 100%);
      }

      .mobile-status-text {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font: 700 10px Arial, Helvetica, sans-serif;
        text-shadow: 1px 1px 0 #000;
      }

      #mobile-control-bar {
        position: fixed;
        left: var(--eq-viewport-left, 0px);
        right: var(--eq-viewport-right, 0px);
        bottom: var(--eq-viewport-bottom, 0px);
        z-index: 50;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 7px 8px calc(7px + env(safe-area-inset-bottom, 0px));
        min-height: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px));
        background:
          linear-gradient(rgba(17, 12, 8, 0.93), rgba(17, 12, 8, 0.93)),
          url('/ui/stone-bg.png') repeat;
        border-top: 2px solid #2a2116;
        box-shadow: 0 -3px 14px rgba(0,0,0,0.45);
      }

      .mobile-nav-button {
        appearance: none;
        -webkit-appearance: none;
        min-width: 0;
        min-height: 48px;
        padding: 0 4px;
        border: 2px solid #594a32;
        border-radius: 4px;
        background: #211a13;
        color: #d8372b;
        font: 700 12px Arial, Helvetica, sans-serif;
        text-shadow: 1px 1px 0 #000;
        touch-action: manipulation;
      }

      .mobile-nav-button.active {
        border-color: #d8372b;
        background: #5a3925;
        box-shadow: inset 0 0 7px rgba(216,55,43,0.36);
      }

      input,
      textarea,
      select {
        font-size: 16px !important;
      }

      #fps-counter {
        display: none !important;
      }
    }

    @media (max-width: 760px) and (orientation: portrait), (pointer: coarse) and (max-width: 900px) and (orientation: portrait) {
      #bank-panel {
        position: fixed !important;
        left: calc(var(--eq-viewport-left, 0px) + 10px) !important;
        right: calc(var(--eq-viewport-right, 0px) + 10px) !important;
        top: calc(var(--eq-viewport-top, 0px) + 78px + env(safe-area-inset-top, 0px)) !important;
        bottom: calc(var(--eq-viewport-bottom, 0px) + var(--mobile-nav-height, 68px) + env(safe-area-inset-bottom, 0px) + 10px) !important;
        width: auto !important;
        max-width: none !important;
        height: auto !important;
        max-height: none !important;
        transform: none !important;
        --bank-slot-min-size: 52px;
      }

      #bank-panel .bank-panel-body {
        flex-direction: column !important;
        gap: 7px !important;
        padding: 7px 7px 5px !important;
        overflow: hidden !important;
      }

      #bank-panel .bank-panel-bank-col,
      #bank-panel .bank-panel-inv-col {
        min-width: 0 !important;
      }

      #bank-panel .bank-panel-bank-col {
        flex: 1 1 auto !important;
        min-height: 120px !important;
      }

      #bank-panel .bank-panel-inv-col {
        flex: 0 0 auto !important;
      }

      #bank-panel .bank-panel-bank-grid,
      #bank-panel .bank-panel-inv-grid {
        grid-template-columns: repeat(5, minmax(var(--bank-slot-min-size, 52px), 1fr)) !important;
      }

      #bank-panel .bank-panel-bank-grid {
        flex: 1 1 auto !important;
        min-height: 0 !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
      }

      #bank-panel .bank-panel-inv-grid {
        flex: 0 0 auto !important;
        max-height: min(28dvh, 210px) !important;
        overflow-y: auto !important;
      }

      #bank-panel .bank-panel-label {
        margin-bottom: 3px !important;
        font-size: 11px !important;
      }

      #bank-panel .bank-panel-footer {
        padding: 0 7px 7px !important;
      }

      #bank-panel .bank-panel-hint {
        display: none !important;
      }
    }

    @media (max-height: 520px) and (max-width: 900px) and (orientation: landscape) {
      #game-frame {
        --mobile-nav-height: 48px;
        --mobile-sheet-height: min(78dvh, 290px);
        --mobile-chat-height: min(34dvh, 132px);
        --side-tab-size: 28px;
      }

      #ui-right-column,
      #ui-chat-area {
        left: auto;
        right: var(--eq-viewport-right, 0px);
        width: min(360px, calc(var(--eq-viewport-width, 100dvw) - 32px));
        height: var(--mobile-sheet-height);
        bottom: calc(var(--eq-viewport-bottom, 0px) + var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px));
        max-height: calc(var(--eq-viewport-height, 100dvh) - var(--mobile-nav-height) - env(safe-area-inset-bottom, 0px) - 10px);
        transform: translateY(calc(100% + var(--mobile-nav-height) + 24px));
      }

      #game-frame.mobile-panel-open #ui-right-column,
      #game-frame.mobile-map-open #ui-right-column,
      #game-frame.mobile-chat-open #ui-chat-area {
        transform: translateY(0);
      }

      #game-frame.mobile-panel-open #ui-right-column {
        left: auto;
        right: var(--eq-viewport-right, 0px);
        width: min(238px, calc(var(--eq-viewport-width, 100dvw) - 32px));
        height: min(78dvh, 290px);
        margin-left: 0;
        margin-right: 0;
      }

      #game-frame.mobile-map-open {
        --minimap-size: min(48dvh, 210px);
      }

      #game-frame.mobile-map-open #ui-right-column {
        width: calc(var(--minimap-size) + 28px);
        height: calc(var(--minimap-size) + 28px);
      }

      #game-frame.mobile-chat-open #ui-chat-area {
        width: min(400px, calc(var(--eq-viewport-width, 100dvw) - 260px));
        height: var(--mobile-chat-height);
      }

      #ui-chat-area,
      #game-frame.mobile-chat-open #ui-chat-area {
        left: var(--eq-viewport-left, 0px);
        right: auto;
        bottom: var(--eq-viewport-bottom, 0px);
        width: min(400px, calc(var(--eq-viewport-width, 100dvw) - 260px));
        height: var(--mobile-chat-height);
        max-height: var(--mobile-chat-height);
        border-left: 0;
        border-bottom: 0;
        border-radius: 0 6px 0 0;
        background: rgba(18, 13, 9, 0.72);
        backdrop-filter: blur(1px);
        overflow: visible;
        transform: none;
        pointer-events: auto;
      }

      #ui-chat-inner,
      #chat-panel {
        overflow: visible;
      }

      #game-frame.mobile-chat-collapsed #ui-chat-area {
        transform: translateX(-100%);
      }

      #game-frame.mobile-chat-collapsed #chat-panel > :not(#chat-collapse-button) {
        opacity: 0;
        pointer-events: none;
      }

      #ui-chat-area .eq-text-tab {
        padding: 2px 8px !important;
        font-size: 10px !important;
      }

      #chat-log {
        margin: 2px 6px !important;
        padding: 4px 6px !important;
        font-size: 10px !important;
        line-height: 1.3 !important;
        background: rgba(32, 22, 15, 0.68) !important;
      }

      #chat-input {
        min-height: 32px;
        padding: 4px 7px !important;
        font-size: 16px !important;
      }

      #chat-collapse-button {
        position: absolute;
        top: auto;
        right: -30px;
        bottom: 0;
        z-index: 3;
        display: block;
        width: 28px;
        height: 25%;
        min-height: 30px;
        transform: none;
        padding: 0;
        border: 1px solid rgba(216, 55, 43, 0.6);
        border-top: 0;
        border-right: 0;
        border-bottom: 0;
        border-radius: 0 4px 0 0;
        background: rgba(10, 7, 5, 0.78);
        color: #d8372b;
        font: 700 14px Arial, Helvetica, sans-serif;
        line-height: 1;
        text-shadow: 1px 1px 0 #000;
        touch-action: manipulation;
      }

      #mobile-status-hud {
        width: min(150px, calc(var(--eq-viewport-width, 100dvw) - 16px));
        gap: 3px;
        padding: 5px;
      }

      .mobile-status-item {
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 4px;
      }

      .mobile-status-label,
      .mobile-status-text {
        font-size: 9px;
      }

      .mobile-status-track {
        height: 12px;
      }

      #mobile-logout-button,
      #mobile-admin-button {
        min-width: 72px;
        min-height: 30px;
        padding: 0 8px;
        font-size: 10px;
      }

      #mobile-admin-button {
        right: calc(var(--eq-viewport-right, 0px) + 86px);
      }

      #mobile-control-bar {
        left: auto;
        right: var(--eq-viewport-right, 0px);
        width: min(220px, 46dvw);
        transform: none;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0;
        padding: 0 0 env(safe-area-inset-bottom, 0px);
        min-height: calc(var(--mobile-nav-height) + env(safe-area-inset-bottom, 0px));
        border: 2px solid #2a2116;
        border-right: 0;
        border-bottom: 0;
        border-radius: 6px 0 0 0;
      }

      #mobile-control-bar .mobile-nav-button:nth-child(3) {
