name: Deploy to EvilQuest

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-evilquest
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        with:
          host: ${{ secrets.EVILQUEST_HOST }}
          username: ${{ secrets.EVILQUEST_USER }}
          key: ${{ secrets.EVILQUEST_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: DISCORD_TOKEN,DISCORD_GUILD_ID
          script: |
            set -euo pipefail
            cd /opt/evilquest
            echo "--- fetching ---"
            git fetch --depth 1 origin main
            git reset --hard origin/main
            git log -1 --oneline
            echo "--- building ---"
            docker compose up -d --build --remove-orphans
            echo "--- pruning ---"
            docker image prune -f
            echo "--- health ---"
            sleep 5
            curl -fsS http://127.0.0.1:4000/ >/dev/null
            docker ps --filter name=evilquest --format "{{.Status}}"
            docker logs evilquest --tail 10
