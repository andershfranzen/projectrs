services:
  evilquest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Compose reads the project-root .env file by default, so
        # VITE_RECAPTCHA_SITE_KEY there flows straight through to the
        # client bundle at build time.
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    image: evilquest:latest
    container_name: evilquest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - evilquest_data:/app/data
    environment:
      CLIENT_ORIGINS: "https://evilquest.net,https://www.evilquest.net"
      NODE_ENV: production
      # Server-side reCAPTCHA secret. Sourced from host .env by compose.
      # When unset the server logs a warning and skips verification.
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-}

  left-hand:
    build:
      context: ./left-hand-bot
      dockerfile: Dockerfile
    image: left-hand-bot:latest
    container_name: left-hand
    restart: unless-stopped
    depends_on:
      - evilquest
    environment:
      DISCORD_TOKEN: ${LEFT_HAND_DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${LEFT_HAND_DISCORD_GUILD_ID:-}
      EVILQUEST_STATUS_URL: http://evilquest:4000/api/status
      LEFT_HAND_SET_NICKNAME: ${LEFT_HAND_SET_NICKNAME:-false}
      LEFT_HAND_LOG_LEVEL: ${LEFT_HAND_LOG_LEVEL:-INFO}

volumes:
  evilquest_data:
