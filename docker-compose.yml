services:
  evilquest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Compose reads the project-root .env file by default, so
        # VITE_RECAPTCHA_SITE_KEY there flows straight through to the
        # client bundle at build time.
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    image: evilquest:latest
    container_name: evilquest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - evilquest_data:/app/data
    environment:
      CLIENT_ORIGINS: "https://evilquest.net,https://www.evilquest.net"
      NODE_ENV: production
      # Server-side reCAPTCHA secret. Sourced from host .env by compose.
      # When unset the server logs a warning and skips verification.
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-}

  left-hand:
    build:
      context: ./left-hand-bot
      dockerfile: Dockerfile
    image: left-hand-bot:latest
    container_name: left-hand
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server/data/items.json:/app/game-data/items.json:ro
    environment:
      DISCORD_TOKEN: ${LEFT_HAND_DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${LEFT_HAND_DISCORD_GUILD_ID:-}
      EVILQUEST_API_BASE_URL: ${LEFT_HAND_EVILQUEST_API_BASE_URL:-https://evilquest.net}
      LEFT_HAND_ITEMS_PATH: ${LEFT_HAND_ITEMS_PATH:-/app/game-data/items.json}
      LEFT_HAND_TRADING_POST_CHANNEL_ID: ${LEFT_HAND_TRADING_POST_CHANNEL_ID:-1504543318401482854}
      LEFT_HAND_TRADE_LISTING_SCAN_LIMIT: ${LEFT_HAND_TRADE_LISTING_SCAN_LIMIT:-100}
      LEFT_HAND_BUG_REPORT_AUTOMATION_ENABLED: ${LEFT_HAND_BUG_REPORT_AUTOMATION_ENABLED:-false}
      LEFT_HAND_BUG_REPORT_PARENT_CHANNEL_ID: ${LEFT_HAND_BUG_REPORT_PARENT_CHANNEL_ID:-}
      LEFT_HAND_FIXED_AUTHOR_USER_IDS: ${LEFT_HAND_FIXED_AUTHOR_USER_IDS:-}
      LEFT_HAND_BUG_REPORT_ARCHIVE_ON_STATUS: ${LEFT_HAND_BUG_REPORT_ARCHIVE_ON_STATUS:-true}
      LEFT_HAND_BUG_REPORT_THREAD_SCAN_LIMIT: ${LEFT_HAND_BUG_REPORT_THREAD_SCAN_LIMIT:-200}
      LEFT_HAND_SET_NICKNAME: ${LEFT_HAND_SET_NICKNAME:-false}
      LEFT_HAND_LOG_LEVEL: ${LEFT_HAND_LOG_LEVEL:-INFO}

volumes:
  evilquest_data:
