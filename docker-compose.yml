services:
  evilquest:
    build:
      context: .
      dockerfile: Dockerfile
    image: evilquest:latest
    container_name: evilquest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - evilquest_data:/app/data
    environment:
      CLIENT_ORIGINS: "https://evilquest.net,https://www.evilquest.net"
      NODE_ENV: production

volumes:
  evilquest_data:
